# =============================================================================
# Nginx — Configuration pour Laravel (Minimarket)
# =============================================================================
#
# Ce fichier est monté dans le conteneur nginx à :
#   /etc/nginx/conf.d/default.conf
#
# Fonctionnement :
#   1. Nginx sert les fichiers statiques (JS, CSS, images) directement
#      depuis public/ sans passer par PHP
#   2. Les requêtes vers des fichiers inexistants sont routées vers index.php
#      (routeur Laravel)
#   3. index.php est exécuté par PHP-FPM via le service Docker "app" sur
#      le port 9000 (FastCGI)
# =============================================================================

server {
    listen 80;
    server_name _;

    # Racine publique de Laravel (seul ce dossier est exposé au web)
    root /var/www/public;
    index index.php;

    # Taille max des uploads (logos d'application, imports Excel de produits)
    client_max_body_size 20M;

    # ── Routage principal ──────────────────────────────────────────────────────
    # try_files : cherche d'abord le fichier exact ($uri), puis un dossier
    # ($uri/), puis passe à index.php avec les paramètres de query string.
    # C'est ce qui permet aux routes Laravel (/dashboard, /products, etc.)
    # de fonctionner sans extension .php dans l'URL.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Exécution PHP via FastCGI ──────────────────────────────────────────────
    # Toute requête vers un fichier .php est transmise au service "app"
    # (PHP-FPM) sur le port 9000.
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        # SCRIPT_FILENAME : chemin absolu du fichier PHP à exécuter
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        # Timeout élevé pour les exports PDF/Excel et les imports de produits
        fastcgi_read_timeout 300;
    }

    # ── Sécurité : interdire l'accès aux fichiers .htaccess ───────────────────
    location ~ /\.ht {
        deny all;
    }

    # ── Cache navigateur pour les assets statiques ─────────────────────────────
    # Les fichiers générés par Vite ont un hash dans leur nom (app.abc123.js),
    # ce qui les rend immuables. On peut donc les mettre en cache 1 an.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
